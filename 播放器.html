<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliVibe Player</title>
    <style>
        body { margin: 0; padding: 20px 0; background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .menu-btn { position: absolute; top: 20px; right: 25px; font-size: 26px; cursor: pointer; z-index: 90; color: #fb7299; transition: 0.2s; }
        .menu-btn:hover { transform: scale(1.1); }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 85%; max-width: 380px; height: 100vh;
            background: #1a1a1a; box-shadow: -5px 0 25px rgba(0,0,0,0.8); z-index: 100;
            transition: right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 20px; display: flex; flex-direction: column; box-sizing: border-box;
        }
        .sidebar.open { right: 0; }
        .sidebar-header { font-size: 18px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { cursor: pointer; font-size: 20px; color: #888; } .close-btn:hover { color: #fb7299; }
        #libraryContainer { overflow-y: auto; flex-grow: 1; border-top: 1px solid #333; padding-top: 10px; }

        .player-card, .playlist-card { background: #1e1e1e; border-radius: 20px; padding: 30px; width: 85%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        
        /* 🌟 升级：加长了歌单的高度，让它能显示更多歌曲 */
        .playlist-card { padding: 20px; max-height: 400px; overflow-y: auto; text-align: left; }
        
        .record { width: 200px; height: 200px; border-radius: 50%; margin: 0 auto 20px; background: url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=500&auto=format&fit=crop') center/cover; border: 5px solid #333; box-shadow: 0 0 15px rgba(0,0,0,0.8); transition: transform 0.5s; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { color: #b3b3b3; font-size: 14px; margin-bottom: 20px; }
        
        .progress-wrapper { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 12px; color: #b3b3b3; }
        #progressBar { flex-grow: 1; margin: 0 10px; cursor: pointer; accent-color: #fb7299; height: 4px; background: #333; outline: none; }

        .input-group { margin-bottom: 12px; display: flex; justify-content: center; }
        input[type="text"] { padding: 10px; border-radius: 20px 0 0 20px; border: none; outline: none; background: #333; color: white; width: 65%; font-size: 12px; }
        .parse-btn { padding: 10px 15px; border-radius: 0 20px 20px 0; border: none; background: #fb7299; color: white; font-weight: bold; cursor: pointer; font-size: 12px; white-space: nowrap;}
        .fav-btn { background: #00a1d6; } 

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding: 0 10px;}
        .mode-btn { background: #333; color: white; border: none; border-radius: 15px; padding: 8px 12px; font-size: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; width: 85px; justify-content: center; }
        .mode-btn:hover { background: #444; }
        .play-group { display: flex; align-items: center; gap: 15px; }
        .play-btn { background: white; color: black; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border: none; }
        .nav-btn { background: transparent; color: white; border: none; font-size: 20px; cursor: pointer; padding: 5px; opacity: 0.8; transition: 0.2s; }
        .nav-btn:hover { opacity: 1; transform: scale(1.1); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .playlist-header { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #888; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between;}
        .list-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #2a2a2a; transition: 0.2s; border-radius: 8px; }
        .list-item:hover { background: #2a2a2a; }
        .list-item.playing { background: #333; border-left: 3px solid #fb7299; border-bottom: none; }
        
        .item-cover { width: 35px; height: 35px; border-radius: 6px; background-size: cover; background-position: center; margin-right: 12px; flex-shrink: 0; cursor: pointer;}
        .item-info { display: flex; flex-direction: column; overflow: hidden; flex-grow: 1; cursor: pointer;}
        .item-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }
        .item-bv { font-size: 11px; color: #888; margin-top: 2px; }
        
        .item-actions { display: flex; gap: 10px; padding-left: 10px; }
        .icon-btn { background: transparent; border: none; font-size: 16px; cursor: pointer; opacity: 0.7; transition: 0.2s; padding: 0; }
        .icon-btn:hover { opacity: 1; transform: scale(1.2); }
        
        .clear-btn { background: transparent; border: 1px solid #555; color: #888; border-radius: 10px; padding: 3px 8px; font-size: 12px; cursor: pointer; }
        .clear-btn:hover { border-color: #fb7299; color: #fb7299; }

        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
        
        /* 侧边栏专属状态提示 */
        #sidebarStatus { font-size: 12px; color: #fb7299; text-align: center; min-height: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()" title="打开我的曲库">☰</div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span>📚 我的音乐库</span>
            <span class="close-btn" onclick="toggleSidebar()">✖</span>
        </div>
        
        <div class="input-group">
            <input type="text" id="bvInput" placeholder="输入链接扩充曲库">
            <button class="parse-btn" onclick="handleSingleParse()">单曲导入</button>
        </div>
        <div class="input-group">
            <input type="text" id="favInput" placeholder="输入收藏夹 fid">
            <button class="parse-btn fav-btn" onclick="importFav()">批量导入</button>
        </div>
        <div id="sidebarStatus"></div> <div id="libraryContainer"></div>
    </div>

    <div class="player-card">
        <div class="record" id="cover"></div>
        <div class="title" id="title">等待点歌...</div>
        <div class="artist">BiliVibe Audio</div>

        <div class="progress-wrapper">
            <span id="currentTime">00:00</span>
            <input type="range" id="progressBar" value="0" min="0" max="100" step="1">
            <span id="duration">00:00</span>
        </div>

        <div class="controls">
            <button class="mode-btn" onclick="togglePlayMode()" id="modeBtn">🔁 列表循环</button>
            <div class="play-group">
                <button class="nav-btn" onclick="playPrev()">⏮</button>
                <button class="play-btn" onclick="togglePlay()">▶</button>
                <button class="nav-btn" onclick="playNext()">⏭</button>
            </div>
        </div>
    </div>

    <div class="playlist-card">
        <div class="playlist-header">
            <span>🎵 正在播放歌单</span>
            <button class="clear-btn" onclick="clearPlaylist()">清空歌单</button>
        </div>
        <div id="playlistContainer"></div>
    </div>

    <script>
        const audioPlayer = new Audio();
        let isPlaying = false; let isDragging = false; 
        
        let library = JSON.parse(localStorage.getItem('bilivibe_library')) || [];
        let playlist = JSON.parse(localStorage.getItem('bilivibe_playlist')) || [];
        
        let currentPlayingBv = ''; 
        let playMode = 'sequence'; 
        const modeTexts = { 'sequence': '🔁 列表循环', 'random': '🔀 随机播放', 'single': '🔂 单曲循环' };

        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playlistContainer = document.getElementById('playlistContainer');
        const libraryContainer = document.getElementById('libraryContainer');
        const sidebarStatus = document.getElementById('sidebarStatus'); // 新增状态文本

        function initDataSync() {
            let changed = false;
            playlist.forEach(song => {
                if (!library.some(libItem => libItem.bv === song.bv)) {
                    library.unshift(song);
                    changed = true;
                }
            });
            if (changed) saveLibrary();
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        audioPlayer.addEventListener('loadedmetadata', () => { durationEl.innerText = formatTime(audioPlayer.duration); progressBar.max = audioPlayer.duration; });
        audioPlayer.addEventListener('timeupdate', () => { if (!isDragging) { progressBar.value = audioPlayer.currentTime; currentTimeEl.innerText = formatTime(audioPlayer.currentTime); } });
        audioPlayer.addEventListener('ended', () => { playNext(true); });
        progressBar.addEventListener('input', () => { isDragging = true; currentTimeEl.innerText = formatTime(progressBar.value); });
        progressBar.addEventListener('change', () => { audioPlayer.currentTime = progressBar.value; setTimeout(() => { isDragging = false; }, 100); });

        function togglePlay(forcePlay = null) {
            const playBtn = document.querySelector('.play-btn'); const coverEl = document.getElementById('cover');
            const shouldPlay = forcePlay !== null ? forcePlay : !isPlaying;
            if (shouldPlay) { audioPlayer.play(); playBtn.innerText = "⏸"; coverEl.style.animation = "spin 10s linear infinite"; isPlaying = true; } 
            else { audioPlayer.pause(); playBtn.innerText = "▶"; coverEl.style.animation = "none"; isPlaying = false; }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function togglePlayMode() {
            playMode = playMode === 'sequence' ? 'random' : (playMode === 'random' ? 'single' : 'sequence');
            document.getElementById('modeBtn').innerText = modeTexts[playMode];
        }

        function saveLibrary() { localStorage.setItem('bilivibe_library', JSON.stringify(library)); renderLibrary(); }
        function savePlaylist() { localStorage.setItem('bilivibe_playlist', JSON.stringify(playlist)); renderPlaylist(); }

        function renderLibrary() {
            libraryContainer.innerHTML = ''; 
            if (library.length === 0) {
                libraryContainer.innerHTML = '<div style="color:#666; text-align:center; font-size:12px; margin-top:20px;">曲库空空如也，快在上面输入链接导入吧！</div>';
                return;
            }
            library.forEach(item => {
                const itemDiv = document.createElement('div'); itemDiv.className = 'list-item';
                itemDiv.innerHTML = `
                    <div class="item-cover" style="background-image: url('${item.cover}')"></div>
                    <div class="item-info">
                        <div class="item-title">${item.title}</div>
                        <div class="item-bv">${item.bv}</div>
                    </div>
                    <div class="item-actions">
                        <button class="icon-btn" title="立即播放" onclick="playFromLibrary('${item.bv}')">▶️</button>
                        <button class="icon-btn" title="添加至歌单" onclick="addToPlaylist('${item.bv}')">➕</button>
                        <button class="icon-btn" title="删除" onclick="removeFromLibrary('${item.bv}')">🗑️</button>
                    </div>
                `;
                libraryContainer.appendChild(itemDiv);
            });
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = ''; 
            if (playlist.length === 0) {
                playlistContainer.innerHTML = '<div style="color:#666; text-align:center; font-size:12px; margin-top:20px;">歌单没歌啦，请打开右上角 ☰ 曲库添加~</div>';
                return;
            }
            playlist.forEach((item, index) => {
                const isPlayingItem = item.bv === currentPlayingBv;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'list-item ' + (isPlayingItem ? 'playing' : '');
                itemDiv.innerHTML = `
                    <div class="item-cover" style="background-image: url('${item.cover}')" onclick="startPlay('${item.bv}')"></div>
                    <div class="item-info" onclick="startPlay('${item.bv}')">
                        <div class="item-title" style="color: ${isPlayingItem ? '#fb7299' : 'white'}">${item.title}</div>
                    </div>
                    <div class="item-actions">
                        <button class="icon-btn" title="移除" onclick="removeFromPlaylist(${index})">✖</button>
                    </div>
                `;
                playlistContainer.appendChild(itemDiv);
            });
        }

        function addToPlaylist(bv) {
            const song = library.find(item => item.bv === bv);
            if (song && !playlist.some(item => item.bv === bv)) {
                playlist.push(song); savePlaylist();
            }
        }

        function playFromLibrary(bv) {
            addToPlaylist(bv); 
            startPlay(bv);     
            if(window.innerWidth < 600) toggleSidebar(); 
        }

        function removeFromLibrary(bv) {
            library = library.filter(item => item.bv !== bv);
            playlist = playlist.filter(item => item.bv !== bv); 
            saveLibrary(); savePlaylist();
            if(currentPlayingBv === bv) { audioPlayer.pause(); currentPlayingBv = ''; document.getElementById('title').innerText = "等待点歌..."; }
        }

        function removeFromPlaylist(index) {
            playlist.splice(index, 1); savePlaylist();
        }

        function clearPlaylist() {
            playlist = []; savePlaylist();
            audioPlayer.pause(); currentPlayingBv = ''; document.getElementById('title').innerText = "等待点歌...";
            document.getElementById('cover').style.backgroundImage = `url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=500&auto=format&fit=crop')`;
            progressBar.value = 0; currentTimeEl.innerText = "00:00"; durationEl.innerText = "00:00";
        }

        function playNext(isAuto = false) {
            if (playlist.length === 0) return;
            if (playMode === 'single' && isAuto) { audioPlayer.currentTime = 0; togglePlay(true); return; }
            let currentIndex = playlist.findIndex(item => item.bv === currentPlayingBv);
            let nextIndex = playMode === 'random' ? Math.floor(Math.random() * playlist.length) : (currentIndex !== -1 ? (currentIndex + 1) % playlist.length : 0);
            startPlay(playlist[nextIndex].bv);
        }

        function playPrev() {
            if (playlist.length === 0) return;
            let currentIndex = playlist.findIndex(item => item.bv === currentPlayingBv);
            let prevIndex = playMode === 'random' ? Math.floor(Math.random() * playlist.length) : (currentIndex > 0 ? currentIndex - 1 : playlist.length - 1);
            startPlay(playlist[prevIndex].bv);
        }

        // 🌟 升级：把状态文字显示在侧边栏内，不干扰主播放器
        async function handleSingleParse() {
            const url = document.getElementById('bvInput').value;
            if(!url) return alert("请输入链接！");
            sidebarStatus.innerText = "⏳ 扩充曲库中...";
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/parse?url=${url}`);
                const data = await response.json();
                if(data.error) { sidebarStatus.innerText = "❌ " + data.error; return; }

                const songData = { bv: url, title: data.title, cover: data.cover };
                if(!library.some(item => item.bv === songData.bv)) { library.unshift(songData); saveLibrary(); }
                
                document.getElementById('bvInput').value = '';
                sidebarStatus.innerText = "✅ 单曲已成功入库！";
                setTimeout(() => sidebarStatus.innerText = "", 3000); // 3秒后清除提示

            } catch(e) { sidebarStatus.innerText = "❌ 网络错误"; }
        }

        async function importFav() {
            let fidInput = document.getElementById('favInput').value;
            if(!fidInput) return alert("请输入收藏夹 ID！");
            const match = fidInput.match(/fid=(\d+)/);
            const fid = match ? match[1] : fidInput; 

            sidebarStatus.innerText = "⏳ 疯狂拉取收藏夹中...";
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/import_fav?fid=${fid}`);
                const data = await response.json();
                if(data.error) { sidebarStatus.innerText = "❌ " + data.error; return; }

                const newSongs = data.data; 
                newSongs.reverse().forEach(song => {
                    if(!library.some(item => item.bv === song.bv)) library.unshift(song);
                });
                saveLibrary();
                document.getElementById('favInput').value = ''; 
                sidebarStatus.innerText = `✅ 成功扩充 ${newSongs.length} 首歌！`;
                setTimeout(() => sidebarStatus.innerText = "", 3000);

            } catch (error) { sidebarStatus.innerText = "❌ 网络错误，Python没开？"; }
        }

        function startPlay(bv) {
            const song = playlist.find(item => item.bv === bv) || library.find(item => item.bv === bv);
            if(!song) return;
            
            currentPlayingBv = bv;
            document.getElementById('title').innerText = song.title;
            document.getElementById('cover').style.backgroundImage = `url('${song.cover}')`;
            progressBar.value = 0; currentTimeEl.innerText = "00:00"; durationEl.innerText = "00:00";
            
            fetch(`http://127.0.0.1:5000/api/parse?url=${bv}`)
                .then(res => res.json())
                .then(data => {
                    audioPlayer.src = `http://127.0.0.1:5000/api/proxy?url=${encodeURIComponent(data.raw_audio_url)}`;
                    togglePlay(true);
                    renderPlaylist(); 
                });
        }

        window.onload = () => { 
            initDataSync(); 
            renderLibrary(); 
            renderPlaylist(); 
        };
    </script>
</body>
</html>
